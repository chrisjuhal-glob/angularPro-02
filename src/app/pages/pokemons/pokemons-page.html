<h1 class="text-3xl">Listado de Pokemons</h1>
<h2 class="text-2xl">Pagina actual: {{ currentPage() }}</h2>

<hr class="my-2" />

@if (!isLoading()) {
  <pokemons-list [pokemons]="pokemons()" />
} @else {
  <pokemons-list-skeleton />
}

<!--- skeleton list -->
<!--- buttons  -->

<div class="flex items-center justify-between">
  <button class="mt-4" (click)="loadPokemons(-1)">Anterior</button>
  <button class="mt-4" (click)="loadPokemons(+1)">Siguiente</button>
</div>
