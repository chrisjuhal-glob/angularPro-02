@if (pokemon() === null) {
  <div class="flex justify-cebter">
    <h1 class="text-4xl font-bold">Loading...</h1>
  </div>
} @else {
  @let myPokemon = pokemon()!;

  <section class="flex flex-col justify-center">
    <div class="flex justify-center">
      <h1 class="text-4xl fond-bold capitalize my-5">{{ myPokemon.name }}</h1>
    </div>
  </section>

  <section>
    <img
      [src]="myPokemon.sprites.other?.['official-artwork']?.front_default"
      [alt]="myPokemon.name"
      class="w-64 h-64 mx-auto"
      width="256"
      height="256"
    />

    @if (myPokemon.cries.latest !== null) {
      <audio controls class="mx-auto mt-4">
        <source [src]="myPokemon.cries.latest" type="audio/wav" />
      </audio>
    }
  </section>

    <section class="flex flex-col justify-center">
        <h2 class="text-2xl font-bold mt-5">Abilities</h2>
        <div class="flex flex-wrap items-center">
            @for (ability of myPokemon.abilities; track $index) {
                <span class="bg-blue-500 text-white px-4 py-2 rounded-full m-2">
                    {{ ability.ability?.name }}
                </span>
            }
        </div>
    </section>
}
