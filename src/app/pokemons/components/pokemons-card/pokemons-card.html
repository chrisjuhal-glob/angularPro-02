<div
  class="bg-blue-500/25 shadow-md rounded-lg flex flex-col p-4 items-center justify-center cursor-pointer"
  [routerLink]="['/pokemon', pokemon()?.name]"
  >
  <img [ngSrc]="pokemonUrl()" [alt]="pokemon()?.name" class="w-24 h-24" width="96" height="96" />

  <div class="mt-2 text-center">
    <h1 class="text-xl font-bold capitalize text-white">{{ pokemon()?.name }}</h1>
  </div>
</div>
